services:
  stock-predictor-api:
    build: .
    image: stock-predictor
    container_name: stock-predictor
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    depends_on:
      - mlflow
    volumes:
      - models_data:/app/models/saved
    restart: unless-stopped

  mlflow:
    image: stock-predictor
    container_name: stock-predictor-mlflow
    user: "0:0"
    command: >
      sh -c "mkdir -p /mlflow/artifacts &&
      mlflow server
      --host 0.0.0.0
      --port 5001
      --allowed-hosts mlflow,mlflow:5001,localhost,localhost:5001,127.0.0.1,127.0.0.1:5001
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination file:///mlflow/artifacts
      --serve-artifacts"
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://mlflow:5001').read()"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  trainer:
    image: stock-predictor
    container_name: stock-predictor-trainer
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      - MLFLOW_EXPERIMENT_NAME=stock-predictor
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - models_data:/app/models/saved
    command: ["python", "models/train.py"]
    restart: "no"

volumes:
  mlflow_data:
  models_data:
